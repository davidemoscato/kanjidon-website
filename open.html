<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#F47932">

    <!-- Apple Smart App Banner: iOS Safari shows native "OPEN" banner -->
    <meta name="apple-itunes-app" content="app-id=6747951805">

    <title>Opening Kanjidon...</title>

    <!-- Font Preload -->
    <link rel="preload" href="/assets/fonts/nunito-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/nunito-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/nunito-800.woff2" as="font" type="font/woff2" crossorigin>

    <style>
        @font-face{font-family:'Nunito';font-style:normal;font-weight:500;font-display:optional;src:url('/assets/fonts/nunito-500.woff2') format('woff2')}
        @font-face{font-family:'Nunito';font-style:normal;font-weight:700;font-display:optional;src:url('/assets/fonts/nunito-700.woff2') format('woff2')}
        @font-face{font-family:'Nunito';font-style:normal;font-weight:800;font-display:optional;src:url('/assets/fonts/nunito-800.woff2') format('woff2')}

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F5;
            color: #1C1C1E;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            color: #1C1C1E;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #8E8E93;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Spinner */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #E5E5E5;
            border-top-color: #DE6A35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .open-btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background: #DE6A35;
            color: #FFFFFF;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            margin-bottom: 12px;
        }
        .open-btn:hover { opacity: 0.9; }

        /* Secondary button: "Open in browser" escape hatch for in-app browsers */
        .browser-btn {
            display: block;
            width: 100%;
            padding: 12px 24px;
            background: transparent;
            color: #8E8E93;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, border-color 0.2s;
            margin-bottom: 4px;
        }
        .browser-btn:hover { border-color: #DE6A35; color: #DE6A35; }

        .store-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .store-links img {
            height: 40px;
            border-radius: 8px;
        }

        .divider {
            font-size: 13px;
            color: #ADA9A4;
            margin: 16px 0;
        }

        /* Phase: redirecting (spinner visible, buttons hidden) */
        .phase-redirecting .open-btn,
        .phase-redirecting .browser-btn,
        .phase-redirecting .store-links,
        .phase-redirecting .divider { display: none; }

        /* Phase: fallback (spinner hidden, buttons visible) */
        .phase-fallback .spinner { display: none; }

        /* Hide browser escape hatch on desktop and real browsers (only useful in in-app browsers) */
        .hide { display: none !important; }

        @media (max-width: 400px) {
            .card { padding: 32px 20px; }
            .title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="card phase-redirecting" id="card">
        <img src="/assets/images/icona.png" alt="Kanjidon" class="logo">

        <div class="spinner" id="spinner"></div>

        <h1 class="title" id="title">Opening Kanjidon...</h1>
        <p class="subtitle" id="subtitle">You'll be redirected to the app in a moment.</p>

        <button class="open-btn" id="open-btn" onclick="openApp()">Open in Kanjidon</button>

        <!-- Escape hatch: shown only in detected in-app browsers where custom scheme may fail -->
        <a class="browser-btn hide" id="browser-btn" href="#">Open in browser</a>

        <div class="divider" id="divider">or download the app</div>

        <div class="store-links">
            <a href="https://apps.apple.com/app/id6747951805" id="store-ios">
                <img src="/assets/images/app-store-badge.svg" alt="App Store">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.davidemoscato.kanjidon" id="store-android">
                <img src="/assets/images/google-play-badge.svg" alt="Google Play">
            </a>
        </div>
    </div>

    <script>
    (function() {
        // --- Parse params ---
        var params = new URLSearchParams(window.location.search);
        var destination = params.get('to') || 'home';
        var lang = params.get('lang') || 'en';

        // --- Platform detection ---
        var ua = navigator.userAgent || '';
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);
        var isMobile = isIOS || isAndroid;

        // Detect in-app browsers (Gmail, Outlook, Facebook, Instagram, etc.)
        // These browsers often block custom URL schemes via WKWebView
        var isInAppBrowser = /FBAN|FBAV|Instagram|Outlook|GSA|Gmail|Line|Snapchat|Twitter|LinkedInApp/i.test(ua)
            || (isIOS && !/Safari/i.test(ua) && /AppleWebKit/i.test(ua));
        // iOS trick: real Safari has "Safari" in UA. WKWebView (Gmail, Outlook) does not.

        // --- Custom scheme deep link ---
        var customSchemeUrl = 'kanjidon://' + destination;

        // --- Full page URL (for "open in browser" escape hatch) ---
        var currentUrl = window.location.href;

        // --- Show only relevant store badge ---
        if (isIOS) {
            var el = document.getElementById('store-android');
            if (el) el.style.display = 'none';
        } else if (isAndroid) {
            var el = document.getElementById('store-ios');
            if (el) el.style.display = 'none';
        }

        // --- i18n ---
        var t = {
            it: { title: 'Apertura di Kanjidon...', subtitle: 'Verrai reindirizzato all\'app tra un momento.', btn: 'Apri in Kanjidon', divider: 'oppure scarica l\'app', titleFallback: 'Apri Kanjidon', subtitleFallback: 'Tocca il bottone per aprire l\'app.', browserBtn: 'Apri nel browser' },
            en: { title: 'Opening Kanjidon...', subtitle: 'You\'ll be redirected to the app in a moment.', btn: 'Open in Kanjidon', divider: 'or download the app', titleFallback: 'Open Kanjidon', subtitleFallback: 'Tap the button to open the app.', browserBtn: 'Open in browser' },
            fr: { title: 'Ouverture de Kanjidon...', subtitle: 'Tu seras redirige vers l\'app dans un instant.', btn: 'Ouvrir dans Kanjidon', divider: 'ou telecharge l\'app', titleFallback: 'Ouvrir Kanjidon', subtitleFallback: 'Appuie sur le bouton pour ouvrir l\'app.', browserBtn: 'Ouvrir dans le navigateur' },
            es: { title: 'Abriendo Kanjidon...', subtitle: 'Seras redirigido a la app en un momento.', btn: 'Abrir en Kanjidon', divider: 'o descarga la app', titleFallback: 'Abrir Kanjidon', subtitleFallback: 'Toca el boton para abrir la app.', browserBtn: 'Abrir en el navegador' },
            de: { title: 'Kanjidon wird geoeffnet...', subtitle: 'Du wirst gleich zur App weitergeleitet.', btn: 'In Kanjidon oeffnen', divider: 'oder lade die App herunter', titleFallback: 'Kanjidon oeffnen', subtitleFallback: 'Tippe auf den Button, um die App zu oeffnen.', browserBtn: 'Im Browser oeffnen' },
            pt: { title: 'Abrindo Kanjidon...', subtitle: 'Vais ser redirecionado para a app num momento.', btn: 'Abrir no Kanjidon', divider: 'ou faz download da app', titleFallback: 'Abrir Kanjidon', subtitleFallback: 'Toca no botao para abrir a app.', browserBtn: 'Abrir no navegador' },
            ru: { title: 'Открываем Kanjidon...', subtitle: 'Сейчас ты будешь перенаправлен в приложение.', btn: 'Открыть в Kanjidon', divider: 'или скачай приложение', titleFallback: 'Открыть Kanjidon', subtitleFallback: 'Нажми кнопку, чтобы открыть приложение.', browserBtn: 'Открыть в браузере' },
            ja: { title: 'Kanjidonを開いています...', subtitle: 'まもなくアプリにリダイレクトされます。', btn: 'Kanjidonで開く', divider: 'またはアプリをダウンロード', titleFallback: 'Kanjidonを開く', subtitleFallback: 'ボタンをタップしてアプリを開いてください。', browserBtn: 'ブラウザで開く' },
            zh: { title: '正在打开Kanjidon...', subtitle: '即将跳转到应用。', btn: '在Kanjidon中打开', divider: '或下载应用', titleFallback: '打开Kanjidon', subtitleFallback: '点击按钮打开应用。', browserBtn: '在浏览器中打开' },
            ko: { title: 'Kanjidon 열는 중...', subtitle: '곧 앱으로 이동합니다.', btn: 'Kanjidon에서 열기', divider: '또는 앱 다운로드', titleFallback: 'Kanjidon 열기', subtitleFallback: '버튼을 눌러 앱을 열어주세요.', browserBtn: '브라우저에서 열기' },
            th: { title: 'กำลังเปิด Kanjidon...', subtitle: 'คุณจะถูกนำไปยังแอปในอีกสักครู่', btn: 'เปิดใน Kanjidon', divider: 'หรือดาวน์โหลดแอป', titleFallback: 'เปิด Kanjidon', subtitleFallback: 'แตะปุ่มเพื่อเปิดแอป', browserBtn: 'เปิดในเบราว์เซอร์' },
            vi: { title: 'Dang mo Kanjidon...', subtitle: 'Ban se duoc chuyen den ung dung ngay.', btn: 'Mo trong Kanjidon', divider: 'hoac tai ung dung', titleFallback: 'Mo Kanjidon', subtitleFallback: 'Nhan nut de mo ung dung.', browserBtn: 'Mo trong trinh duyet' },
            id: { title: 'Membuka Kanjidon...', subtitle: 'Kamu akan dialihkan ke aplikasi sebentar lagi.', btn: 'Buka di Kanjidon', divider: 'atau unduh aplikasi', titleFallback: 'Buka Kanjidon', subtitleFallback: 'Ketuk tombol untuk membuka aplikasi.', browserBtn: 'Buka di browser' },
            ar: { title: 'جاري فتح Kanjidon...', subtitle: 'سيتم توجيهك إلى التطبيق بعد لحظات.', btn: 'فتح في Kanjidon', divider: 'أو حمّل التطبيق', titleFallback: 'فتح Kanjidon', subtitleFallback: 'اضغط الزر لفتح التطبيق.', browserBtn: 'فتح في المتصفح' },
            hi: { title: 'Kanjidon खोल रहे हैं...', subtitle: 'आपको कुछ ही पल में ऐप पर भेजा जाएगा।', btn: 'Kanjidon में खोलें', divider: 'या ऐप डाउनलोड करें', titleFallback: 'Kanjidon खोलें', subtitleFallback: 'ऐप खोलने के लिए बटन दबाएं।', browserBtn: 'ब्राउज़र में खोलें' },
            tr: { title: 'Kanjidon aciliyor...', subtitle: 'Birazdan uygulamaya yonlendirileceksin.', btn: 'Kanjidon\'da ac', divider: 'veya uygulamayi indir', titleFallback: 'Kanjidon\'u ac', subtitleFallback: 'Uygulamayi acmak icin butona dokun.', browserBtn: 'Tarayicide ac' },
            pl: { title: 'Otwieranie Kanjidon...', subtitle: 'Za chwile zostaniesz przekierowany do aplikacji.', btn: 'Otworz w Kanjidon', divider: 'lub pobierz aplikacje', titleFallback: 'Otworz Kanjidon', subtitleFallback: 'Kliknij przycisk, aby otworzyc aplikacje.', browserBtn: 'Otworz w przegladarce' },
            fa: { title: 'در حال باز کردن Kanjidon...', subtitle: 'به زودی به اپلیکیشن منتقل می‌شوی.', btn: 'باز کردن در Kanjidon', divider: 'یا اپلیکیشن را دانلود کن', titleFallback: 'باز کردن Kanjidon', subtitleFallback: 'برای باز کردن اپلیکیشن دکمه را بزن.', browserBtn: 'باز کردن در مرورگر' },
            ms: { title: 'Membuka Kanjidon...', subtitle: 'Anda akan dialihkan ke aplikasi sebentar lagi.', btn: 'Buka di Kanjidon', divider: 'atau muat turun aplikasi', titleFallback: 'Buka Kanjidon', subtitleFallback: 'Ketik butang untuk membuka aplikasi.', browserBtn: 'Buka di pelayar' },
            fil: { title: 'Binubuksan ang Kanjidon...', subtitle: 'Ire-redirect ka sa app sa ilang sandali.', btn: 'Buksan sa Kanjidon', divider: 'o i-download ang app', titleFallback: 'Buksan ang Kanjidon', subtitleFallback: 'I-tap ang button para buksan ang app.', browserBtn: 'Buksan sa browser' },
            uk: { title: 'Відкриваємо Kanjidon...', subtitle: 'Зараз тебе перенаправить у додаток.', btn: 'Відкрити в Kanjidon', divider: 'або завантаж додаток', titleFallback: 'Відкрити Kanjidon', subtitleFallback: 'Натисни кнопку, щоб відкрити додаток.', browserBtn: 'Відкрити в браузері' }
        };

        var loc = t[lang] || t['en'];

        // RTL for Arabic and Persian
        if (lang === 'ar' || lang === 'fa') {
            document.documentElement.dir = 'rtl';
        }

        // Apply translations (initial: redirecting phase)
        document.getElementById('title').textContent = loc.title;
        document.getElementById('subtitle').textContent = loc.subtitle;
        document.getElementById('open-btn').textContent = loc.btn;
        document.getElementById('divider').textContent = loc.divider;

        // --- "Open in browser" escape hatch ---
        // In-app browsers (Gmail, Outlook on iOS) block custom schemes.
        // This button opens the same URL in Safari/Chrome where Universal Links work.
        var browserBtn = document.getElementById('browser-btn');
        browserBtn.textContent = loc.browserBtn;

        if (isInAppBrowser && isMobile) {
            browserBtn.classList.remove('hide');

            if (isIOS) {
                // iOS: open in Safari. Safari will trigger Universal Links -> app opens.
                // x-safari-https:// is not reliable. Best approach: copy-paste hint or
                // use window.open which on some in-app browsers opens Safari.
                browserBtn.href = currentUrl;
                browserBtn.setAttribute('target', '_blank');
            } else if (isAndroid) {
                // Android: intent to open in Chrome
                browserBtn.href = 'googlechrome://' + currentUrl.replace(/^https?:\/\//, '');
                // Fallback: same URL in new tab (Chrome Custom Tabs usually handle this)
                browserBtn.onclick = function(e) {
                    // Try Chrome scheme first, if it fails, use target=_blank
                    setTimeout(function() {
                        if (!document.hidden) {
                            window.open(currentUrl, '_blank');
                        }
                    }, 500);
                };
            }
        }

        // --- Open app logic ---
        window.openApp = function() {
            if (isAndroid && !isInAppBrowser) {
                // Android real browser: Intent URL with native fallback to Play Store
                window.location.href = 'intent://' + destination +
                    '#Intent;scheme=kanjidon;package=com.davidemoscato.kanjidon;' +
                    'S.browser_fallback_url=' + encodeURIComponent('https://play.google.com/store/apps/details?id=com.davidemoscato.kanjidon') + ';end';
            } else if (isAndroid && isInAppBrowser) {
                // Android in-app browser (Gmail): Intent URLs work in Chrome Custom Tabs
                window.location.href = 'intent://' + destination +
                    '#Intent;scheme=kanjidon;package=com.davidemoscato.kanjidon;' +
                    'S.browser_fallback_url=' + encodeURIComponent('https://play.google.com/store/apps/details?id=com.davidemoscato.kanjidon') + ';end';
            } else {
                // iOS + desktop: try custom scheme
                window.location.href = customSchemeUrl;

                // Fallback: if still here after 1.5s, scheme was blocked or app not installed
                setTimeout(function() {
                    if (!document.hidden) {
                        // Don't auto-redirect to store on iOS in-app browsers:
                        // the custom scheme likely failed silently, user needs
                        // the "Open in browser" button instead.
                        if (isIOS && !isInAppBrowser) {
                            window.location.href = 'https://apps.apple.com/app/id6747951805';
                        }
                    }
                }, 1500);
            }
        };

        // --- Auto-attempt on mobile ---
        if (isMobile) {
            openApp();

            // After 2s, show fallback UI
            setTimeout(function() {
                var card = document.getElementById('card');
                card.className = 'card phase-fallback';
                document.getElementById('title').textContent = loc.titleFallback;
                document.getElementById('subtitle').textContent = loc.subtitleFallback;
            }, 2000);
        } else {
            // Desktop: skip spinner, show fallback immediately
            var card = document.getElementById('card');
            card.className = 'card phase-fallback';
            document.getElementById('title').textContent = loc.titleFallback;
            document.getElementById('subtitle').textContent = loc.subtitleFallback;
        }
    })();
    </script>
</body>
</html>
